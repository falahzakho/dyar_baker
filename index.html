<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai Space</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617; /* ڕەنگێ ئەسمانێ تاری */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* دروستکرنا ستێرکان ل باکگراوندی */
        .space {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        /* هەسارە وەک وێنە یان شێوەیێن زیندی */
        .planet {
            position: absolute;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: orbit linear infinite;
        }

        .earth { width: 60px; height: 60px; background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center/cover; top: 15%; left: 10%; animation-duration: 20s; }
        .mars { width: 40px; height: 40px; background: url('https://upload.wikimedia.org/wikipedia/commons/5/58/Mars_23_aug_2003_hubble.png') no-repeat center/cover; top: 70%; right: 15%; animation-duration: 15s; }
        .jupiter { width: 100px; height: 100px; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.png') no-repeat center/cover; bottom: 10%; left: 5%; animation-duration: 30s; }
        .moon { width: 30px; height: 30px; background: #ddd; top: 25%; right: 25%; box-shadow: 0 0 15px white; animation-duration: 10s; }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(20px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(20px) rotate(-360deg); }
        }

        /* کارتێ ناڤەندی */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            z-index: 10;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .welcome-text { color: #aaa; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .brand-name { color: #00d4ff; font-size: 35px; font-weight: bold; text-shadow: 0 0 15px rgba(0,212,255,0.7); margin-bottom: 30px; }

        /* دوگمەیێن سۆشیال میدیایێ */
        .social-link {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 15px 0;
            border-radius: 15px;
            font-size: 18px;
            transition: 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 20px rgba(0,212,255,0.3);
        }
    </style>
</head>
<body>

    <div class="space">
        <div class="planet earth"></div>
        <div class="planet mars"></div>
        <div class="planet jupiter"></div>
        <div class="planet moon"></div>
    </div>

    <div class="glass-card">
        <div class="welcome-text">Welcome</div>
        <div class="brand-name">Tech Ai</div>

        <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" class="social-link">Instagram</a>
        <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TZdN7XgRN" class="social-link">TikTok</a>
        <a href="https://t.me/tech_ai_falah" class="social-link">Telegram</a>
    </div>

</body>
</html>
