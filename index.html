<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. لێڤینا ناڤێ Tech AI (ڕەجفین) */
        .tech-ai-container {
            display: inline-block;
            animation: glitch-shake 0.3s infinite ease-in-out;
            /* ئەڤە وێ پاشخانا تە یا شین دپارێزیت */
        }

        @keyframes glitch-shake {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* 2. شێوازێ گۆهرینا زمانێ Welcome */
        #welcome-text {
            font-size: 40px;
            font-weight: bold;
            color: #00f2ff;
            text-shadow: 0 0 15px #00f2ff;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
            text-align: center;
        }

        .flip-active {
            transform: rotateX(360deg);
        }

        /* 3. ستێرێن ل دەور و بەر (لێڤین) */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: blink 2s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="welcome-text">WELCOME</div>

    <div class="tech-ai-container">
        <div style="border: 2px solid #00f2ff; padding: 10px 20px; border-radius: 15px; color: white; box-shadow: 0 0 10px #00f2ff;">
            TECH AI
        </div>
    </div>

    <script>
        // گۆهرینا زمانێ خێرهاتن هەر یەک چرکە
        const welcomeEl = document.getElementById('welcome-text');
        let isEnglish = true;

        setInterval(() => {
            welcomeEl.classList.add('flip-active');
            
            setTimeout(() => {
                isEnglish = !isEnglish;
                welcomeEl.innerText = isEnglish ? "WELCOME" : "خێرهاتن";
                welcomeEl.classList.remove('flip-active');
            }, 300); // نیڤا کاتی بۆ گۆهرینا پەیڤێ
        }, 1500);

        // دروستکرنا ستێران ب شێوەیەکێ ئۆتۆماتیکی
        for (let i = 0; i < 30; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
