<div id="task-page" class="page hidden">
    <h2>Tasks</h2>
    <div id="tg-task-container" class="card-item">
        <div>
            <strong>Join Telegram</strong><br>
            <small id="tg-status">+1 JF Token</small>
        </div>
        <div id="tg-actions">
            <button class="btn" id="btn-join" style="width:auto; padding:5px 15px;" onclick="startTgTask()">Join</button>
            <button class="btn hidden" id="btn-check" style="width:auto; padding:5px 15px; background:#2ecc71" onclick="claimTgTask()">Check</button>
        </div>
    </div>

    <hr style="border:0; border-top:1px solid #30363d; margin:20px 0;">

    <h2>Referral System</h2>
    <div class="card-item">
        <div style="width:100%">
            <strong>Invite Friends</strong><br>
            <small>Get 1 JF for each friend</small>
            <input type="text" id="ref-link" readonly style="margin-top:10px; font-size:0.8rem; background:#000;">
            <button class="btn" onclick="copyRef()">Copy Link</button>
        </div>
    </div>
</div>

<script>
    // --- ل دەسپێکا سکریپتێ خۆ ئەڤان زێدە بکە ---
    let invites = parseInt(localStorage.getItem('jf_invites')) || 0;
    let tgClaimed = localStorage.getItem('jf_tg_claimed') === 'true';

    // دروستکرنا لینکێ ئینڤایتێ تایبەت
    function setupReferral() {
        let userId = localStorage.getItem('jf_user_id');
        if(!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('jf_user_id', userId);
        }
        let currentUrl = window.location.href.split('?')[0];
        document.getElementById('ref-link').value = currentUrl + '?ref=' + userId;
        
        // ئەگەر کەسەک ب ڕێکا لینکەکێ هات بیت
        const urlParams = new URLSearchParams(window.location.search);
        const refBy = urlParams.get('ref');
        if(refBy && !localStorage.getItem('ref_processed')) {
            // ل ڤێرێ دشێی سیستەمێ زێدەکرنا ۱ تۆکن بۆ خودانێ لینکێ دانی (پێدڤی ب باکێند هەیە بۆ ئەنجامدانەکا ڕاستەقینە)
            localStorage.setItem('ref_processed', 'true');
        }
    }

    // سیستەمێ تلیگرامێ
    function startTgTask() {
        window.open('https://t.me/jfnetwork', '_blank');
        document.getElementById('btn-join').classList.add('hidden');
        document.getElementById('btn-check').classList.remove('hidden');
    }

    function claimTgTask() {
        if(tgClaimed) return;
        balance += 1;
        tgClaimed = true;
        localStorage.setItem('jf_bal', balance);
        localStorage.setItem('jf_tg_claimed', 'true');
        updateUI();
        document.getElementById('tg-task-container').style.display = 'none';
        alert("Success! +1 JF Token added.");
    }

    function copyRef() {
        let copyText = document.getElementById("ref-link");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        alert("Link Copied!");
    }

    // نیشاندانا داتایان بێی ژێبرن
    function updateUI() {
        document.getElementById('bal-display').innerText = balance.toFixed(3);
        document.getElementById('inv-count').innerText = invites;
        if(tgClaimed && document.getElementById('tg-task-container')) {
            document.getElementById('tg-task-container').style.display = 'none';
        }
    }

    // دەمێ سایت ڤەدبیت
    window.onload = function() {
        checkStatus();
        setupReferral();
        updateUI();
    };
</script>
