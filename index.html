<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Ai - Space Universe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0B1026 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* دروستکرنا ئەسمانێ ستێرکری */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            animation: move-stars 200s linear infinite;
        }

        @keyframes move-stars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        /* هەسارەیێن ب لڤین */
        .planet {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        .earth {
            width: 150px; height: 150px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center/cover;
            top: -50px; right: -50px;
            box-shadow: 0 0 50px rgba(0, 150, 255, 0.3);
            animation: rotate-planet 60s linear infinite;
        }

        .mars {
            width: 80px; height: 80px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/5/58/Mars_23_aug_2003_hubble.png') no-repeat center/cover;
            bottom: 10%; left: 5%;
            animation: float 10s infinite ease-in-out;
        }

        .saturn {
            width: 200px; height: 120px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Saturn_during_Equinox.jpg/800px-Saturn_during_Equinox.jpg') no-repeat center/cover;
            top: 60%; right: -20px;
            opacity: 0.5;
            transform: rotate(20deg);
        }

        @keyframes rotate-planet { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* دیزاینا کارتێ */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 320px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .welcome { color: #888; text-transform: uppercase; letter-spacing: 3px; font-size: 12px; }
        .title { color: white; font-size: 40px; margin: 10px 0 40px 0; text-shadow: 0 0 20px #00d4ff; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            background: #00d4ff;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 25px #00d4ff;
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="planet earth"></div>
    <div class="planet mars"></div>
    <div class="planet saturn"></div>

    <div class="container">
        <div class="welcome">Welcome</div>
        <div class="title">Tech Ai</div>

        <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" class="btn" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-95TZdN7XgRN" class="btn" target="_blank">TikTok</a>
        <a href="https://t.me/tech_ai_falah" class="btn" target="_blank">Telegram</a>
    </div>

</body>
</html>
