<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Space Journey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: radial-gradient(circle at center, #0a192f 0%, #000 100%);
            --text-color: #00d4ff;
            --sun-moon-shadow: 0 0 50px #00d4ff;
        }

        [data-theme="light"] {
            --bg-color: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            --text-color: #ffffff;
            --sun-moon-shadow: 0 0 60px #ffea00;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; background: var(--bg-color);
            font-family: 'Poppins', sans-serif; overflow: hidden;
            transition: background 1s ease; color: white;
        }

        /* --- Shooting Stars --- */
        .shooting_star {
            position: absolute; height: 2px;
            background: linear-gradient(-45deg, #fff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #fff);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) rotate(45deg); } 100% { transform: translateX(300px) rotate(45deg); } }

        /* Theme Switch - Top Right */
        .theme-switch {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            cursor: pointer; font-size: 1.5rem; background: rgba(255,255,255,0.1);
            padding: 10px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); color: white; transition: 0.3s;
        }

        /* Planets */
        .planet { position: absolute; border-radius: 50%; opacity: 0.7; pointer-events: none; transition: 1s ease; }
        .saturn { width: 80px; height: 40px; background: #e3bb76; top: 15%; left: 10%; transform: rotate(-20deg); box-shadow: inset -10px -10px 20px #000; }
        .jupiter { width: 100px; height: 100px; background: radial-gradient(circle, #d39c7e, #af6124); top: 60%; left: 5%; }
        .moon { width: 40px; height: 40px; background: #ddd; top: 30%; right: 40%; box-shadow: 0 0 15px #fff; }

        /* Brand & Orbit */
        .welcome-msg { font-size: 3rem; font-weight: 800; text-transform: uppercase; color: var(--text-color); text-shadow: var(--sun-moon-shadow); margin-bottom: 20px; z-index: 10; }
        .container { position: relative; width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; }
        .brand-name {
            color: #ffffff; font-size: 2rem; font-weight: 900;
            text-shadow: 0 0 25px #00d4ff; z-index: 10;
            padding: 10px 20px; background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--text-color); border-radius: 15px;
            animation: neonPulse 2s infinite alternate;
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #00d4ff; } to { box-shadow: 0 0 30px #00d4ff; } }

        .orbit { position: absolute; width: 100%; height: 100%; border: 1px dashed rgba(255, 255, 255, 0.2); border-radius: 50%; animation: rotateOrbit 15s linear infinite; }
        .icon-link { position: absolute; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 1.5rem; transition: 0.4s; }
        .tiktok { top: -25px; left: 50%; transform: translateX(-50%); color: #ff0050; }
        .instagram { bottom: -25px; left: 50%; transform: translateX(-50%); color: #E1306C; }
        .telegram { top: 50%; left: -25px; transform: translateY(-50%); color: #0088cc; }
        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- New Contact Icon & Popup --- */
        .contact-trigger {
            position: fixed; bottom: 20px; left: 20px;
            width: 55px; height: 55px; background: var(--text-color);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: black; font-size: 1.4rem; z-index: 1000;
            box-shadow: 0 0 15px var(--text-color);
        }
        .contact-popup {
            position: fixed; bottom: 85px; left: 20px;
            background: rgba(10, 25, 47, 0.95); padding: 20px; border-radius: 15px;
            backdrop-filter: blur(15px); border: 1px solid var(--text-color);
            width: 260px; display: none; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .contact-popup.active { display: block; }
        .contact-popup input, .contact-popup textarea {
            width: 100%; padding: 10px; margin: 5px 0;
            background: rgba(255,255,255,0.1); border: 1px solid #333;
            color: white; border-radius: 8px; box-sizing: border-box;
        }
        .contact-popup button {
            width: 100%; padding: 10px; background: var(--text-color);
            border: none; color: black; font-weight: bold; border-radius: 8px; cursor: pointer;
        }

        #live-time { position: fixed; bottom: 15px; right: 20px; color: var(--text-color); font-weight: bold; }
    </style>
</head>
<body data-theme="dark">

    <div id="shooting-stars-box"></div>

    <div class="theme-switch" onclick="toggleTheme()" title="گوهۆڕینا مۆدێ">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="planet saturn"></div>
    <div class="planet jupiter"></div>
    <div class="planet moon"></div>

    <div class="welcome-msg">welcome</div>

    <div class="container">
        <div class="brand-name">Tech Ai</div>
        <div class="orbit">
            <a href="https://www.tiktok.com/@_tech_ai_" target="_blank" class="icon-link tiktok"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.instagram.com/__tech_.ai._" target="_blank" class="icon-link instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/tech_ai_falah" target="_blank" class="icon-link telegram"><i class="fab fa-telegram"></i></a>
        </div>
    </div>

    <div class="contact-trigger" onclick="toggleContact()" title="نامێ بنێرە">
        <i class="fas fa-envelope"></i>
    </div>
    <div class="contact-popup" id="contactBox">
        <h4 style="margin: 0 0 10px 0; color: var(--text-color);">Contact Me</h4>
        <input type="text" id="name" placeholder="Navێ te...">
        <textarea id="msg" rows="3" placeholder="Nameya te..."></textarea>
        <button onclick="sendTele()">Send to Telegram</button>
    </div>

    <div id="live-time">00:00:00</div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
        }

        function toggleContact() {
            document.getElementById('contactBox').classList.toggle('active');
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'shooting_star';
            star.style.top = Math.random() * 50 + '%';
            star.style.left = Math.random() * 100 + '%';
            document.getElementById('shooting-stars-box').appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }
        setInterval(createStar, 2500);

        setInterval(() => {
            document.getElementById('live-time').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function sendTele() {
            const n = document.getElementById('name').value;
            const m = document.getElementById('msg').value;
            if(n && m) {
                window.open(`https://t.me/falahzakho?text=Nav: ${n}%0AName: ${m}`, '_blank');
            }
        }
    </script>
</body>
</html>
