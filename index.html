<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Real Universe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #020202;
            --text-color: #00d4ff;
        }

        [data-theme="light"] {
            --bg-color: #87CEEB;
            --text-color: #f39c12;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* دوگمەیا گوهۆڕینێ */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        /* گەردوون و هەسارە */
        .universe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .planet-img {
            position: absolute;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: rotateSelf 20s linear infinite;
            transition: opacity 1s, transform 1s;
        }

        @keyframes rotateSelf {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        [data-theme="light"] .planet-img {
            opacity: 0;
            transform: scale(0);
        }

        /* پێگەیا هەسارەیان */
        .mercury { width: 30px; top: 15%; left: 20%; animation-duration: 5s; }
        .venus { width: 50px; bottom: 15%; left: 10%; animation-duration: 15s; }
        .earth { width: 60px; top: 10%; right: 25%; animation-duration: 20s; }
        .mars { width: 45px; bottom: 20%; right: 30%; animation-duration: 18s; }
        .jupiter { width: 120px; top: 50%; left: 5%; animation-duration: 40s; }
        .saturn { width: 140px; top: 10%; left: 40%; animation-duration: 35s; }
        .uranus { width: 70px; bottom: 10%; right: 5%; animation-duration: 25s; }
        .neptune { width: 65px; top: 40%; right: 5%; animation-duration: 30s; }
        .moon { width: 25px; top: 20%; right: 22%; animation-duration: 10s; }

        /* تشتێن سەرەکی */
        .welcome-msg {
            font-size: 3rem;
            font-weight: 900;
            color: var(--text-color);
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
            z-index: 10;
            margin-bottom: 20px;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .brand-name {
            font-size: 2.5rem;
            color: white;
            padding: 15px 30px;
            border: 2px solid var(--text-color);
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* ڕۆژ بۆ Light Mode */
        .sun {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff700, #ff8800);
            border-radius: 50%;
            box-shadow: 0 0 100px #ff8800;
            top: -300px;
            left: 50%;
            transform: translateX(-50%);
            transition: 1s ease-in-out;
        }

        [data-theme="light"] .sun { top: 50px; }

    </style>
</head>
<body data-theme="dark">

    <div class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i> مۆد بگۆڕە
    </div>

    <div class="universe">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_color_-_Prockter07-edit1.jpg" class="planet-img mercury" alt="Mercury">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Venus_from_探査機_Messenger.jpg" class="planet-img venus" alt="Venus">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" class="planet-img earth" alt="Earth">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg" class="planet-img mars" alt="Mars">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg" class="planet-img jupiter" alt="Jupiter">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg" class="planet-img saturn" alt="Saturn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg" class="planet-img uranus" alt="Uranus">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg" class="planet-img neptune" alt="Neptune">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/FullMoon2010.jpg" class="planet-img moon" alt="Moon">
    </div>

    <div class="sun"></div>

    <div class="welcome-msg">WELCOME TO TECH AI</div>

    <div class="container">
        <div class="brand-name">Tech Ai ZAKHO</div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
        }
    </script>
</body>
</html>
