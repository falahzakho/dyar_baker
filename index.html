<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Cloud Mining</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #050a14;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: var(--bg); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }

        .auth-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid var(--primary);
            width: 100%; max-width: 320px; text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255,255,255,0.1); border: 1px solid #333;
            border-radius: 10px; color: white; outline: none;
        }

        button {
            width: 100%; padding: 12px; background: var(--primary);
            border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        /* App Layout */
        .app-container { display: none; flex-direction: column; height: 100%; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--card-bg); }
        .balance-card {
            background: linear-gradient(45deg, #001f3f, #00d4ff);
            margin: 20px; padding: 30px; border-radius: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .balance-amount { font-size: 2.5rem; font-weight: 800; }

        /* Sections */
        .section { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 80px; }
        .active-section { display: block; }

        /* Mining Section */
        .mining-circle {
            width: 180px; height: 180px; border: 5px solid var(--primary);
            border-radius: 50%; margin: 40px auto;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; font-weight: bold; color: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; } }

        /* Tasks & Referral */
        .item-card {
            background: var(--card-bg); padding: 15px; border-radius: 15px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border-right: 4px solid var(--primary);
        }

        /* Bottom Nav */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(10, 20, 30, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--card-bg); z-index: 1000;
        }
        .nav-item { color: #888; text-align: center; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--primary); transform: translateY(-5px); }
        .nav-item i { font-size: 1.5rem; display: block; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:var(--primary); font-weight: 900;">TECH AI</h1>
        <p>Mining & Tasks Platform</p>
        <div class="auth-card">
            <h3>Login / Sign Up</h3>
            <input type="text" id="username" placeholder="Username...">
            <input type="password" id="password" placeholder="Password...">
            <button onclick="login()">Enter App</button>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <header>
            <h2 id="user-display">Tech AI Miner</h2>
        </header>

        <div class="balance-card">
            <p style="margin:0; opacity:0.8;">Total Tech AI Tokens</p>
            <div class="balance-amount" id="balance">0.000</div>
        </div>

        <div class="section active-section" id="home">
            <h3 style="text-align:center;">Cloud Mining</h3>
            <div class="mining-circle" id="mining-btn" onclick="startMining()">
                START MINING
            </div>
            <p id="status" style="text-align:center; color:var(--primary);">Status: IDLE</p>
        </div>

        <div class="section" id="tasks">
            <h3>Daily Tasks</h3>
            <div class="item-card">
                <span>Follow TikTok</span>
                <button style="width:auto; padding:5px 15px;" onclick="claimTask(1, this)">+1 Token</button>
            </div>
            <div class="item-card">
                <span>Watch Video</span>
                <button style="width:auto; padding:5px 15px;" onclick="claimTask(1, this)">+1 Token</button>
            </div>
            <div class="item-card">
                <span>Join Telegram</span>
                <button style="width:auto; padding:5px 15px;" onclick="claimTask(1, this)">+1 Token</button>
            </div>
        </div>

        <div class="section" id="profile">
            <h3>Your Profile</h3>
            <div class="item-card">
                <span>Referral Link:</span>
                <small id="ref-link">tech.ai/ref?falah</small>
            </div>
            <button onclick="claimTask(5, this)">Invite Friend (+5 Tokens)</button>
            <br><br>
            <button style="background:#ff4757;" onclick="location.reload()">Logout</button>
        </div>

        <nav>
            <div class="nav-item active" onclick="showSection('home', this)">
                <i class="fas fa-hammer"></i> Home
            </div>
            <div class="nav-item" onclick="showSection('tasks', this)">
                <i class="fas fa-tasks"></i> Tasks
            </div>
            <div class="nav-item" onclick="showSection('profile', this)">
                <i class="fas fa-user"></i> Profile
            </div>
        </nav>
    </div>

    <script>
        let balance = 0;
        let isMining = false;

        // 1. Auth Logic
        function login() {
            const user = document.getElementById('username').value;
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = user;
            } else {
                alert("Please enter a username!");
            }
        }

        // 2. Navigation
        function showSection(id, element) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        // 3. Mining Logic
        function startMining() {
            if(isMining) return;
            isMining = true;
            document.getElementById('mining-btn').innerText = "MINING...";
            document.getElementById('status').innerText = "Status: ACTIVE";
            
            setInterval(() => {
                balance += 0.001;
                updateDisplay();
            }, 1000);
        }

        // 4. Tasks & Referral
        function claimTask(amount, btn) {
            balance += amount;
            updateDisplay();
            btn.innerText = "CLAIMED";
            btn.disabled = true;
            btn.style.background = "#555";
        }

        function updateDisplay() {
            document.getElementById('balance').innerText = balance.toFixed(3);
        }
    </script>
</body>
</html>
