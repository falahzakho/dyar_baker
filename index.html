<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI Website</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050a14;
        }

        /* 1. وێنەیێ تە وەک پاشبنەما (بێ گوهۆڕین) */
        .main-bg {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px; 
            background: url('image.png') no-repeat center center;
            background-size: contain;
        }

        /* 2. نڤیسینا Welcome ل سەر ناڤێ TECH AI */
        .welcome-msg {
            position: absolute;
            top: 13%; 
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #00d2ff;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 3. ب تنێ تەپا دنیا دزڤڕیت */
        .earth-spin {
            position: absolute;
            top: 45.8%; 
            left: 23.8%;
            width: 105px;
            height: 105px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png') no-repeat center;
            background-size: contain;
            border-radius: 50%;
            animation: rotateEarth 12s linear infinite;
            pointer-events: none; /* دا کو ڕێگریێ ل کلیکێ نەکەت */
        }

        @keyframes rotateEarth {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 4. لینک ل سەر ئایکۆنان (بێ جولە) */
        .clickable-area {
            position: absolute;
            width: 65px;
            height: 65px;
            /* background: rgba(255,0,0,0.2);  بۆ تێستێ جهی ڤی ڕەنگی لادە */
            cursor: pointer;
        }

        .insta { top: 38%; right: 18%; }
        .tele { top: 52%; right: 35%; }
        .tiktok { top: 62%; right: 13%; }

    </style>
</head>
<body>

    <div class="main-bg">
        <div class="welcome-msg">Welcome</div>

        <div class="earth-spin"></div>

        <a href="https://www.instagram.com/__tech_.ai._" target="_blank" class="clickable-area insta"></a>
        <a href="https://t.me/tech_ai_falah" target="_blank" class="clickable-area tele"></a>
        <a href="https://www.tiktok.com/@_tech_ai_" target="_blank" class="clickable-area tiktok"></a>
    </div>

</body>
</html>
