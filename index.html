<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | خوارنگەها تەکنیک</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e67e22;
            --dark: #2c3e50;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background-color: var(--dark);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 10px;
        }

        /* لاپەرێ سەرەکی */
        .main-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .category-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .category-card:hover { transform: translateY(-5px); }

        .category-card img { width: 100%; height: 150px; object-fit: cover; }

        .category-card h3 { padding: 10px; margin: 0; }

        /* لاپەرێ خوارنان */
        .food-list { display: none; }

        .food-item {
            background: white;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .food-item img {
            width: 80px; height: 80px;
            border-radius: 10px;
            object-fit: cover;
            margin-left: 15px;
        }

        .food-info { flex-grow: 1; }
        .food-info h4 { margin: 0 0 5px 0; color: var(--primary); }
        .price { font-weight: bold; color: #27ae60; }

        .back-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }

    </style>
</head>
<body>

<header>
    <h1>Tech Rest</h1>
    <p>ب خیر بێن بۆ تاموچێژا تەکنیکی</p>
</header>

<div class="container">
    
    <div id="home" class="main-menu">
        <div class="category-card" onclick="showCategory('pizza')">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=400&q=80" alt="پیتزا">
            <h3>پیتزا</h3>
        </div>
        <div class="category-card" onclick="showCategory('kada')">
            <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec?auto=format&fit=crop&w=400&q=80" alt="کادە">
            <h3>کادە</h3>
        </div>
    </div>

    <div id="pizza" class="food-list">
        <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-right"></i> ڤەگەر بۆ سەرەکی</button>
        <h3>جورێن پیتزایێ</h3>
        
        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1574071318508-1cdbad80ad50?w=200" alt="Pizza">
            <div class="food-info">
                <h4>پیتزا ئیتالی</h4>
                <div class="price">٥,٠٠٠ دینار</div>
            </div>
        </div>

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?w=200" alt="Pizza">
            <div class="food-info">
                <h4>پیتزا پێپەرۆنی</h4>
                <div class="price">٥,٠٠٠ دینار</div>
            </div>
        </div>

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200" alt="Pizza">
            <div class="food-info">
                <h4>پیتزا فاهیتا</h4>
                <div class="price">٥,٠٠٠ دینار</div>
            </div>
        </div>
        
        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1598177090164-83950673e44c?w=200" alt="Pizza">
            <div class="food-info">
                <h4>پیتزا ماسی</h4>
                <div class="price">٧,٠٠٠ دینار</div>
            </div>
        </div>
    </div>

    <div id="kada" class="food-list">
        <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-right"></i> ڤەگەر بۆ سەرەکی</button>
        <h3>جورێن کادەیێ</h3>
        
        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=200" alt="Kada">
            <div class="food-info">
                <h4>کادا پەنێری</h4>
                <div class="price">٤,٠٠٠ دینار</div>
            </div>
        </div>

        <div class="food-item">
            <img src="https://images.unsplash.com/photo-1603532648955-0393e01c8f3d?w=200" alt="Kada">
            <div class="food-info">
                <h4>کادا گوشتی</h4>
                <div class="price">٥,٠٠٠ دینار</div>
            </div>
        </div>
    </div>

</div>

<script>
    function showCategory(id) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('pizza').style.display = 'none';
        document.getElementById('kada').style.display = 'none';
        
        document.getElementById(id).style.display = 'block';
    }

    function showHome() {
        document.getElementById('home').style.display = 'grid';
        document.getElementById('pizza').style.display = 'none';
        document.getElementById('kada').style.display = 'none';
    }
</script>

</body>
</html>
