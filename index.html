<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Global Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #001d3d 0%, #000 100%);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .world-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* وێنەیێ جیهانێ ل ناڤەڕاستێ */
        .earth {
            width: 250px;
            height: 250px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px #000, 0 0 50px rgba(0, 212, 255, 0.4);
            z-index: 5;
            animation: rotateEarth 60s linear infinite;
        }

        @keyframes rotateEarth {
            from { background-position: 0 0; }
            to { background-position: 500px 0; }
        }

        /* تور و هێلێن ل دەور جیهانێ */
        .network-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(0.95); opacity: 0.3; }
            to { transform: scale(1.05); opacity: 0.6; }
        }

        /* خولا ئایکۆنان */
        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: rotateOrbit 15s linear infinite;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-link {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 2rem;
            border: 2px solid rgba(0, 212, 255, 0.3);
            transition: 0.4s;
            /* بۆ هندێ ئایکۆن بخۆ نەزڤریت و رێک بیت */
            animation: reverseRotate 15s linear infinite;
        }

        @keyframes reverseRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .icon-link:hover {
            transform: scale(1.2) rotate(0deg);
            background: #fff;
            box-shadow: 0 0 30px #00d4ff;
        }

        /* دیارکرنا جهێن ئایکۆنان ل سەر بازنەی */
        .tiktok { top: -30px; left: 50%; transform: translateX(-50%); color: #ff0050; }
        .instagram { bottom: 50px; left: -30px; color: #E1306C; }
        .telegram { bottom: 50px; right: -30px; color: #0088cc; }

        .brand-text {
            position: absolute;
            bottom: -80px;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 15px #00d4ff;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <div class="world-container">
        <div class="network-bg"></div>
        <div class="earth"></div>
        
        <div class="orbit">
            <a href="https://www.tiktok.com/@_tech_ai_" target="_blank" class="icon-link tiktok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.instagram.com/__tech_.ai._" target="_blank" class="icon-link instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://t.me/tech_ai_falah" target="_blank" class="icon-link telegram">
                <i class="fab fa-telegram"></i>
            </a>
        </div>

        <div class="brand-text">TECH AI</div>
    </div>

</body>
</html>
